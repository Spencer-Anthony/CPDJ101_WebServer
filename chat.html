<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat Room</title>
    <style>
        :root {
            --bg: #6d94b0;
            --panel: #ffffff;
            --border: #d5dfed;
            --text: #1f2a37;
            --muted: #66758a;
            --brand: #2b6cb0;
            --brand-hover: #1f4f82;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #6d94b0 0%, #8cadcd 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .chat {
            width: min(860px, 100%);
            height: min(84vh, 720px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 14px 36px rgba(10, 20, 35, 0.2);
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .chat-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fbff;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.05rem;
        }

        .status {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .messages {
            margin: 0;
            padding: 16px;
            list-style: none;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #ffffff;
        }

        .message {
            max-width: min(85%, 540px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            line-height: 1.4;
            word-break: break-word;
            background: #f8fbff;
        }

        .composer {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            border-top: 1px solid var(--border);
            padding: 12px;
            background: #ffffff;
        }

        .composer input {
            min-height: 42px;
            border: 1px solid #c7d3e2;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 0.95rem;
        }

        .composer button,
        .composer a {
            min-height: 42px;
            border: 0;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #send {
            background: var(--brand);
        }

        #send:hover {
            background: var(--brand-hover);
        }

        .home-link {
            background: #7289a3;
        }

        .home-link:hover {
            background: #5f748c;
        }

        @media (max-width: 700px) {
            .chat {
                height: 92vh;
            }

            .composer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="chat" aria-label="Chat interface">
        <header class="chat-header">
            <h1>Chat Room</h1>
            <span id="connection-status" class="status">Connecting...</span>
        </header>

        <ul id="messages" class="messages"></ul>

        <form class="composer" onsubmit="return send(event)">
            <input type="text" name="message" minlength="1" maxlength="500" placeholder="Type a message" autocomplete="off" required>
            <button id="send" type="submit">Send</button>
            <a class="home-link" href="main.html">Home</a>
        </form>
    </main>

    <script>
        const messages = document.getElementById("messages");
        const statusEl = document.getElementById("connection-status");
        const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${wsProtocol}://${location.host}/ws`);

        function appendMessage(content) {
            const li = document.createElement("li");
            li.className = "message";
            li.textContent = content;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        }

        ws.addEventListener("open", () => {
            statusEl.textContent = "Connected";
        });

        ws.addEventListener("close", () => {
            statusEl.textContent = "Disconnected";
        });

        ws.addEventListener("message", (event) => {
            appendMessage(event.data);
        });

        function send(event) {
            event.preventDefault();
            const message = (new FormData(event.target)).get("message");

            if (message && ws.readyState === WebSocket.OPEN) {
                ws.send(message);
            }

            event.target.reset();
            return false;
        }
    </script>
</body>
</html>
