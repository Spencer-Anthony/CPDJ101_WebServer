<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Room</title>
  <style>
    :root {
      --bg: #020312;
      --panel: #07152a;
      --border: #0e2a48;
      --text: #eaf4ff;
      --muted: #9fbadf;
      --brand: #2b7cff;
      --brand-hover: #1f5fe6;
    }

    :root.light {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --border: #dde3ec;
      --text: #1f2a37;
      --muted: #6b7685;
      --brand: #0f62fe;
      --brand-hover: #0b4fd1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .chat {
      width: min(760px, 100%);
      height: min(80vh, 680px);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 12px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
    }

    .chat-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .status {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .messages {
      margin: 0;
      padding: 16px;
      list-style: none;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: transparent;
    }

    .join-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin: 12px 16px 0 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(43,124,255,0.12);
      color: var(--muted);
    }

    .check-button {
      min-height: 34px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 0 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .message {
      max-width: min(85%, 540px);
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--panel);
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
      border: 1px solid rgba(43,124,255,0.06);
      color: var(--text);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.03);
      background: transparent;
    }

    .composer input {
      min-height: 42px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 0 12px;
      font-size: 0.95rem;
      outline: none;
      background: rgba(255,255,255,0.02);
      color: var(--text);
    }

    .composer input:focus {
      border-color: var(--brand);
    }

    .composer button {
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      background: var(--brand);
      color: #ffffff;
      padding: 0 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 120ms ease;
    }

    .composer button:hover {
      background: var(--brand-hover);
    }

    .username-editor {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .username-editor.visible {
      display: flex;
    }

    .username-editor input {
      width: 140px;
      min-height: 34px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      outline: none;
    }

    .username-editor input:focus {
      border-color: var(--brand);
    }

    .username-editor button {
      min-height: 34px;
      border: 0;
      border-radius: 8px;
      padding: 0 10px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
    }

    .username-editor button.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
    }

    @media (max-width: 640px) {
      body {
        padding: 8px;
      }

      .chat {
        height: 92vh;
        border-radius: 10px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .composer button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="chat" aria-label="Chat interface">
    <header class="chat-header">
      <div style="display:flex;align-items:center;gap:12px">
        <h1 class="chat-title">Basic Chat</h1>
        <button id="theme-toggle" title="Toggle theme" style="background:none;border:0;cursor:pointer;color:var(--muted);font-size:0.95rem;">🌙</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="connection-status" class="status">Connecting...</span>
        <span id="encryption-status" class="status">Encryption: initializing...</span>
        <button id="encryption-check" class="check-button" type="button">Verify</button>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="username-display" class="status" style="font-weight:600"></span>
          <button id="edit-username" title="Change name" style="background:none;border:0;cursor:pointer;color:var(--brand);font-weight:600">Edit</button>
          <div id="username-editor" class="username-editor" aria-label="Username editor">
            <input id="username-input" type="text" maxlength="32" aria-label="Display name" />
            <button id="username-save" type="button">Save</button>
            <button id="username-cancel" type="button" class="secondary">Cancel</button>
          </div>
        </div>
      </div>
    </header>

    <div id="join-banner" class="join-banner" aria-hidden="false">
      <div style="display:flex;gap:10px;align-items:center">
        <strong style="font-size:0.95rem">Encrypted Join URL</strong>
        <span class="join-url" style="font-family:monospace;color:var(--muted)"></span>
      </div>
      <div>
        <button class="copy-join" style="background:var(--brand);border:0;border-radius:8px;padding:8px 10px;color:#ffffff;font-weight:600;cursor:pointer">Copy</button>
      </div>
    </div>

    <ul id="messages" class="messages"></ul>

    <form class="composer" onsubmit="return send(event)">
      <input type="text" name="message" minlength="1" maxlength="500" placeholder="Type a message" autocomplete="off" required />
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    (() => {
    const messages = document.getElementById("messages");
    const status = document.getElementById("connection-status");
    const encryptionStatus = document.getElementById("encryption-status");
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${location.host}/ws`);
    const usernameKey = "chat-username";
    const roomKeyPrefix = "chat-room-key";
    const textEncoder = new TextEncoder();
    const textDecoder = new TextDecoder();
    let aesKey = null;

    function generateUsername() {
      const suffix = Math.floor(1000 + Math.random() * 9000);
      return `Guest-${suffix}`;
    }

    function bytesToBase64(bytes) {
      let binary = "";
      bytes.forEach((value) => {
        binary += String.fromCharCode(value);
      });
      return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function base64ToBytes(value) {
      const padded = value.replaceAll("-", "+").replaceAll("_", "/") + "==".slice((value.length + 2) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function getOrCreateRoomKey() {
      const hash = new URLSearchParams(location.hash.replace(/^#/, ""));
      let roomKey = hash.get("k");
      if (!roomKey) {
        const randomBytes = new Uint8Array(16);
        crypto.getRandomValues(randomBytes);
        roomKey = bytesToBase64(randomBytes);
        hash.set("k", roomKey);
        history.replaceState(null, "", `${location.pathname}#${hash.toString()}`);
      }
      localStorage.setItem(roomKeyPrefix, roomKey);
      return roomKey;
    }

    async function deriveEncryptionKey(roomKey) {
      const hashed = await crypto.subtle.digest("SHA-256", textEncoder.encode(roomKey));
      return crypto.subtle.importKey("raw", hashed, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
    }

    async function encryptPayload(payload) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const plaintext = textEncoder.encode(JSON.stringify(payload));
      const cipherBuffer = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, plaintext);
      return {
        kind: "encrypted",
        iv: bytesToBase64(iv),
        data: bytesToBase64(new Uint8Array(cipherBuffer)),
      };
    }

    async function decryptPayload(envelope) {
      const iv = base64ToBytes(envelope.iv);
      const cipherBytes = base64ToBytes(envelope.data);
      const plainBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, cipherBytes);
      return JSON.parse(textDecoder.decode(plainBuffer));
    }

    let username = localStorage.getItem(usernameKey) || generateUsername();
    localStorage.setItem(usernameKey, username);

    function formatMessage(payload) {
      if (payload && typeof payload === "object" && "name" in payload && "text" in payload) {
        return `${payload.name}: ${payload.text}`;
      }

      return String(payload);
    }

    function appendMessage(content) {
      const li = document.createElement("li");
      li.className = "message";
      li.textContent = content;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    function setEncryptionStatus(text) {
      if (encryptionStatus) {
        encryptionStatus.textContent = text;
      }
    }

    function formatPayload(payload) {
      return `${payload.name}: ${payload.text}`;
    }

    ws.addEventListener("open", () => {
      status.textContent = `Connected as ${username}`;
    });

    ws.addEventListener("close", () => {
      status.textContent = "Disconnected";
    });

    ws.addEventListener("message", async (event) => {
      try {
        const envelope = JSON.parse(event.data);
        if (envelope && envelope.kind === "encrypted") {
          const payload = await decryptPayload(envelope);
          appendMessage(formatPayload(payload));
          setEncryptionStatus("Encryption: active");
          return;
        }

        appendMessage(formatMessage(envelope));
        setEncryptionStatus("Encryption: inactive");
      } catch {
        appendMessage(event.data);
        setEncryptionStatus("Encryption: inactive");
      }
    });

    async function send(event) {
      event.preventDefault();

      const form = event.target;
      const message = (new FormData(form)).get("message");

      if (message && ws.readyState === WebSocket.OPEN) {
        const payload = { name: username, text: message };
        const envelope = aesKey ? await encryptPayload(payload) : payload;
        ws.send(JSON.stringify(envelope));
        setEncryptionStatus(aesKey ? "Encryption: active" : "Encryption: inactive");
      }

      form.reset();
      return false;
    }

    function setUsername(name) {
      const key = usernameKey;
      const chosen = String(name || '').trim() || generateUsername();
      localStorage.setItem(key, chosen);
      // update in-memory and UI
      username = chosen;
      const display = document.getElementById('username-display');
      if (display) display.textContent = chosen;
      const statusEl = document.getElementById('connection-status');
      if (statusEl) statusEl.textContent = ws.readyState === WebSocket.OPEN ? `Connected as ${chosen}` : `Connecting...`;
    }

    function openUsernameEditor() {
      const editor = document.getElementById('username-editor');
      const input = document.getElementById('username-input');
      const editButton = document.getElementById('edit-username');
      if (!editor || !input || !editButton) return;
      input.value = username;
      editor.classList.add('visible');
      editButton.style.display = 'none';
      input.focus();
      input.select();
    }

    function closeUsernameEditor() {
      const editor = document.getElementById('username-editor');
      const editButton = document.getElementById('edit-username');
      if (!editor || !editButton) return;
      editor.classList.remove('visible');
      editButton.style.display = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const roomKey = getOrCreateRoomKey();
      deriveEncryptionKey(roomKey)
        .then((key) => {
          aesKey = key;
          setEncryptionStatus('Encryption: active');
        })
        .catch(() => {
          aesKey = null;
          setEncryptionStatus('Encryption: unavailable');
        });

      // sync username variable
      const stored = localStorage.getItem(usernameKey) || username;
      setUsername(stored);

      const edit = document.getElementById('edit-username');
      if (edit) {
        edit.addEventListener('click', openUsernameEditor);
      }

      const saveButton = document.getElementById('username-save');
      const cancelButton = document.getElementById('username-cancel');
      const input = document.getElementById('username-input');
      if (saveButton && input) {
        saveButton.addEventListener('click', () => {
          setUsername(input.value);
          closeUsernameEditor();
        });
      }
      if (cancelButton) {
        cancelButton.addEventListener('click', closeUsernameEditor);
      }
      if (input) {
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            setUsername(input.value);
            closeUsernameEditor();
          } else if (event.key === 'Escape') {
            event.preventDefault();
            closeUsernameEditor();
          }
        });
      }

      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('light');
        });
      }

      const verifyButton = document.getElementById('encryption-check');
      if (verifyButton) {
        verifyButton.addEventListener('click', async () => {
          if (!aesKey) {
            setEncryptionStatus('Encryption check: unavailable');
            return;
          }

          const testPayload = { name: 'check', text: 'sample' };
          const envelope = await encryptPayload(testPayload);
          const decrypted = await decryptPayload(envelope);
          const encryptedLooksOpaque = envelope.data !== bytesToBase64(textEncoder.encode(JSON.stringify(testPayload)));

          if (decrypted.name === testPayload.name && decrypted.text === testPayload.text && encryptedLooksOpaque) {
            setEncryptionStatus('Encryption check: passed');
          } else {
            setEncryptionStatus('Encryption check: failed');
          }
        });
      }

      // join banner
      const banner = document.getElementById('join-banner');
      if (banner) {
        const share = location.href;
        const urlSpan = banner.querySelector('.join-url');
        if (urlSpan) urlSpan.textContent = share;
        const copyBtn = banner.querySelector('.copy-join');
        if (copyBtn) {
          copyBtn.addEventListener('click', async () => {
            try {
              await navigator.clipboard.writeText(share);
              const prev = copyBtn.textContent;
              copyBtn.textContent = 'Copied';
              setTimeout(() => (copyBtn.textContent = prev), 1200);
            } catch {
              const prev = copyBtn.textContent;
              copyBtn.textContent = 'Unable to copy';
              setTimeout(() => (copyBtn.textContent = prev), 1200);
            }
          });
        }
      }
    });
    })();
  </script>
</body>
</html>
